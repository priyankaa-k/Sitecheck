services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sitecheck
      POSTGRES_PASSWORD: sitecheck
      POSTGRES_DB: sitecheck
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitecheck"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sitecheck:sitecheck@db:5432/sitecheck
      SECRET_KEY: change-me-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
